map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream huigui_app {
    server app:3000;
}

upstream huigui_api {
    server api:3001;
}

server {
    listen 80;
    server_name crm.hui-health.com;

    return 301 https://$host$request_uri;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://huigui_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://huigui_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
    }
}

server {
    listen 443 ssl http2;
    server_name crm.hui-health.com;

    ssl_certificate /etc/letsencrypt/live/crm.hui-health.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.hui-health.com/privkey.pem;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://huigui_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://huigui_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
    }
}
